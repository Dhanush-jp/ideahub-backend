spring.application.name=ideahub-backend

server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${JWT_SECRET:c3VwZXItc2VjdXJlLWtleS1mb3ItaWRlYWh1Yi1hcHAtMjAyNi0wMw==}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://your-frontend.vercel.app}
app.admin.username=${ADMIN_USERNAME:admin123}
app.admin.email=${ADMIN_EMAIL:admin123}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.seed.enabled=${APP_SEED_ENABLED:true}

app.ai.enabled=${AI_ENABLED:true}
app.ai.mock-on-failure=${AI_MOCK_ON_FAILURE:true}
app.ai.huggingface.base-url=${HUGGINGFACE_BASE_URL:https://router.huggingface.co/hf-inference/models}
app.ai.huggingface.validation-model=${HUGGINGFACE_VALIDATION_MODEL:google/flan-t5-large}
app.ai.huggingface.text-to-sql-model=${HUGGINGFACE_TEXT_TO_SQL_MODEL:google/flan-t5-large}
app.ai.huggingface.api-key=${HUGGINGFACE_TOKEN:${HUGGINGFACE_API_KEY:}}
app.ai.huggingface.connect-timeout-ms=${HUGGINGFACE_CONNECT_TIMEOUT_MS:5000}
app.ai.huggingface.read-timeout-ms=${HUGGINGFACE_READ_TIMEOUT_MS:20000}

logging.level.root=INFO
logging.level.com.ideahub.backend=INFO
logging.level.org.hibernate.SQL=WARN
