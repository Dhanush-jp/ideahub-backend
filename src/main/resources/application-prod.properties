# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update   
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# SECURITY (JWT)
# ===============================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:86400000}

# ===============================
# CORS CONFIG
# ===============================
# Set your frontend URL in Render ENV (recommended)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ===============================
# ADMIN DEFAULT CONFIG
# ===============================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD:change-this-password}

# ===============================
# DATA SEEDING
# ===============================
app.seed.enabled=${APP_SEED_ENABLED:false}

# ===============================
# AI CONFIG (HuggingFace)
# ===============================
app.ai.enabled=${AI_ENABLED:true}
app.ai.mock-on-failure=${AI_MOCK_ON_FAILURE:false}

app.ai.huggingface.base-url=${HUGGINGFACE_BASE_URL:https://router.huggingface.co/hf-inference/models}
app.ai.huggingface.validation-model=${HUGGINGFACE_VALIDATION_MODEL:google/flan-t5-large}
app.ai.huggingface.text-to-sql-model=${HUGGINGFACE_TEXT_TO_SQL_MODEL:google/flan-t5-large}

# API Key (supports both variable names)
app.ai.huggingface.api-key=${HUGGINGFACE_TOKEN:${HUGGINGFACE_API_KEY:}}

app.ai.huggingface.connect-timeout-ms=${HUGGINGFACE_CONNECT_TIMEOUT_MS:5000}
app.ai.huggingface.read-timeout-ms=${HUGGINGFACE_READ_TIMEOUT_MS:20000}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.ideahub.backend=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
